<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basilio TATTO</title>
    <style>

        body {
            background-color: #f4f4f9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            padding: 50px;
            color: #333;
        }
        .bloco {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            max-width: 500px;
            margin: 0 auto;
        }
        h1 { color: #0076ff; }
        button {
            background-color: #0076ff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover { background-color: #0056b3; }
    </style>
</head>
<body>

<div class="bloco">
    <h1>Vixe, tá vivo! 🚀</h1>
    <p>Se você tá lendo isso aqui, quer dizer que seu primeiro site funcionou direto do seu computador.</p>
    <button onclick="avisar()">Clique aqui, vá!</button>
</div>

<script>
    function avisar() {
        alert("Eita, o botão funcionou direitinho! Tu já tá virando programador.");
    }
</script>

</body>
</html>
